services:
  backend:
    build:
      context: ./backend
    container_name: vpn-diagnostics-backend
    environment:
      - PORT=4000
      - NODE_ENV=production
    ports:
      - "4000:4000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE=http://localhost:4000
        - VITE_WS_BASE=ws://localhost:4000
    container_name: vpn-diagnostics-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
